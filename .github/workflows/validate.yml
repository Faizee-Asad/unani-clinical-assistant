name: Validate project

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: python -m pip install -e .[dev]
      - name: Validate skill
        run: python scripts/validate_skill.py skills/unani-clinical-assistant
      - name: Check for obvious PHI patterns in public examples/docs
        run: python scripts/check_no_phi.py examples skills docs README.md DISCLAIMER.md CONTRIBUTING.md SECURITY.md
      - name: Build skill ZIP
        run: python scripts/make_skill_zip.py
      - name: Run tests
        run: python -m pytest
